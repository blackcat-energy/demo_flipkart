kind = "web"
previewPath = "/"
title = "RouteGenie"
version = "1.0.0"
id = "artifacts/routegenie"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25464

[services.development]
run = "pnpm --filter @workspace/routegenie run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/routegenie", "run", "build" ]
publicDir = "artifacts/routegenie/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25464"
BASE_PATH = "/"
